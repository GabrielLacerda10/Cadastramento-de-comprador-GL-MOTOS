<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastramento de comprador Gl motos</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Cadastro de Usuário</h1>

    <form>

      <div class="grupo">
        <label>Nome Completo</label>
        <input type="text">
      </div>

      <div class="linha">
        <div class="grupo">
          <label>Cidade</label>
          <input type="text">
        </div>

        <div class="grupo">
          <label>Bairro</label>
          <input type="text">
        </div>
      </div>

      <div class="linha">
        <div class="grupo">
          <label>Rua</label>
          <input type="text">
        </div>

        <div class="grupo">
          <label>N° da Casa</label>
          <input type="text">
        </div>
      </div>

      <div class="grupo">
        <label>Ponto de Referência</label>
        <input type="text">
      </div>

      <div class="linha">
        <div class="grupo">
          <label>Data de Nascimento</label>
          <input type="date">
        </div>

        <div class="grupo">
          <label>Gênero</label>
          <select required>
            <option value="">Selecione</option>
            <option>Masculino</option>
            <option>Feminino</option>
            <option>Outro</option>
          </select>
        </div>
      </div>

      <div class="grupo">
        <label>Estado Civil</label>
        <select required>
          <option value="">Selecione</option>
          <option>Solteiro(a)</option>
          <option>Casado(a)</option>
          <option>Divorciado(a)</option>
          <option>Viúvo(a)</option>
        </select>
      </div>

      <div class="grupo">
        <label>Email</label>
        <input type="email">
      </div>

      <div class="grupo">
        <label>Senha</label>
        <input type="password">
      </div>

      <button type="submit">Cadastrar</button>

    </form>
  </div>

</body>
</html>
